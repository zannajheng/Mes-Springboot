<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../lib/font-awesome-4.7.0/css/font-awesome.min.css" media="all">
    <link rel="stylesheet" href="../css/public.css" media="all">
    <script src="../lib/jquery/jquery.min.js?v=v2.2.0" charset="utf-8"></script>
    <script src="../lib/layui/layui.js?v=v2.5.6" charset="utf-8"></script>
    <script src="../js/spConfig.js?v=1.0.0" charset="utf-8"></script>
    <script src="../js/spUtil.js?v=1.0.0" charset="utf-8"></script>
</head>

<body>
    <div class="splayui-container">
        <div class="splayui-main">
            <form class="layui-form splayui-form">
                <div class="layui-row">
                    <div class="layui-col-xs6 layui-col-sm6 layui-col-md6">
                        <div class="layui-form-item">
                            <label for="js-old-password" class="layui-form-label sp-required">原密码</label>                        <div class="layui-input-inline">
                            <input type="password" id="js-old-password" name="oldPassword" lay-verify="required" autocomplete="off" class="layui-input" placeholder="请输入原密码">
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label for="js-new-password" class="layui-form-label sp-required">新密码</label>
                        <div class="layui-input-inline">
                            <input type="password" id="js-new-password" name="newPassword" lay-verify="required" autocomplete="off" class="layui-input" placeholder="请输入新密码">
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <label for="js-repassword" class="layui-form-label sp-required">确认密码</label>
                        <div class="layui-input-inline">
                            <input type="password" id="js-repassword" name="repassword" lay-verify="required" autocomplete="off" class="layui-input" placeholder="请再次输入新密码">
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-col-xs12 layui-col-sm12 layui-col-md12">
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button id="js-submit" class="layui-btn" lay-submit lay-filter="js-submit-filter">保存</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<script>
    layui.use(['form'], function () {
        var form = layui.form;

        form.on('submit(js-submit-filter)', function (data) {
            var newPassword = $('#js-new-password').val();
            var repassword = $('#js-repassword').val();

            if (newPassword !== repassword) {
                layer.alert('两次输入的密码不一致！', {
                    icon: 2
                });
                return false;
            }

            spUtil.ajax({
                url: '/admin/sys/user/change-password',
                type: 'POST',
                data: data.field,
                success: function (result) {
                    layer.alert('修改成功！', {
                        icon: 1
                    }, function (alertIndex) {
                        layer.close(alertIndex);
                        parent.layer.close(parent.layer.getFrameIndex(window.name));
                    });
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
