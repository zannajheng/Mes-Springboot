<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>基本资料</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../lib/font-awesome-4.7.0/css/font-awesome.min.css" media="all">
    <link rel="stylesheet" href="../css/public.css" media="all">
    <script src="../lib/jquery/jquery.min.js?v=v2.2.0" charset="utf-8"></script>
    <script src="../lib/layui/layui.js?v=v2.5.6" charset="utf-8"></script>
    <script src="../js/spConfig.js?v=1.0.0" charset="utf-8"></script>
    <script src="../js/spUtil.js?v=1.0.0" charset="utf-8"></script>
</head>

<body>
    <div class="splayui-container">
        <div class="splayui-main">
            <form class="layui-form splayui-form">
                <div class="layui-row">
                    <div class="layui-col-xs6 layui-col-sm6 layui-col-md6">
                        <div class="layui-form-item">
                            <label for="js-name" class="layui-form-label sp-required">姓名</label>
                            <div class="layui-input-inline">
                                <input type="text" id="js-name" name="name" lay-verify="required" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label for="js-username" class="layui-form-label sp-required">用户名</label>
                            <div class="layui-input-inline">
                                <input type="text" id="js-username" name="username" lay-verify="required"
                                    autocomplete="off" class="layui-input" readonly>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label class="layui-form-label">部门</label>
                            <div class="layui-input-inline">
                                <select id="js-dept-id" name="deptId" lay-verify="" class="layui-input">
                                    <option value="">请选择部门</option>
                                </select>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label for="js-email" class="layui-form-label">邮箱</label>
                            <div class="layui-input-inline">
                                <input type="text" id="js-email" name="email" lay-verify="" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label for="js-mobile" class="layui-form-label">手机号</label>
                            <div class="layui-input-inline">
                                <input type="text" id="js-mobile" name="mobile" lay-verify="number" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label for="js-tel" class="layui-form-label">固定电话</label>
                            <div class="layui-input-inline">
                                <input type="text" id="js-tel" name="tel" lay-verify="" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label for="js-sex" class="layui-form-label">性别</label>
                            <div class="layui-input-block" id="js-sex">
                                <input type="radio" name="sex" value="0" title="女">
                                <input type="radio" name="sex" value="1" title="男">
                                <input type="radio" name="sex" value="2" title="其他">
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <label for="js-birthday" class="layui-form-label">出生年月日</label>
                            <div class="layui-input-inline">
                                <input type="text" id="js-birthday" name="birthday" lay-verify="" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-xs6 layui-col-sm6 layui-col-md6">
                        <div class="layui-form-item">
                            <label for="js-pic-id" class="layui-form-label">头像</label>
                            <div class="layui-input-inline">
                                <div class="layui-upload">
                                    <button type="button" class="layui-btn" id="js-upload-btn">上传头像</button>
                                    <div class="layui-upload-list">
                                        <img class="layui-upload-img" id="js-upload-preview">
                                        <input type="hidden" id="js-pic-id" name="picId">
                                        <p id="js-upload-text"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <input id="js-id" name="id" type="hidden" />
                                <button id="js-submit" class="layui-btn" lay-submit
                                    lay-filter="js-submit-filter">保存</button>
                                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <style>
        .layui-upload-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #e6e6e6;
            object-fit: cover;
        }
    </style>
    <script>
        layui.use(['form', 'laydate', 'upload'], function () {
            var form = layui.form,
                laydate = layui.laydate,
                upload = layui.upload;

            laydate.render({
                elem: '#js-birthday',
                format: 'yyyy-MM-dd'
            });

            $('input[name="email"]').blur(function () {
                if ($('input[name="email"]').val()) {
                    $('input[name="email"]').attr('lay-verify', 'email');
                } else {
                    $('input[name="email"]').removeAttr('lay-verify');
                }
            });

            upload.render({
                elem: '#js-upload-btn',
                url: '/admin/sys/user/upload-avatar',
                accept: 'images',
                size: 2048,
                before: function (obj) {
                    obj.preview(function (index, file, result) {
                        $('#js-upload-preview').attr('src', result);
                    });
                },
                done: function (res) {
                    if (res.code === 0) {
                        $('#js-pic-id').val(res.data);
                        $('#js-upload-text').text('上传成功');
                    } else {
                        $('#js-upload-text').text(res.msg);
                    }
                },
                error: function () {
                    $('#js-upload-text').text('上传失败');
                }
            });

            // 加载部门列表
            spUtil.ajax({
                url: '/admin/sys/department/list',
                type: 'GET',
                errNoTip: true,
                success: function (deptResult) {
                    if (deptResult.code === 0) {
                        $.each(deptResult.data, function (i, dept) {
                            $('#js-dept-id').append('<option value="' + dept.id + '">' + dept.name + '</option>');
                        });
                        form.render('select');
                    }
                }
            });

            // 加载当前用户信息
            spUtil.ajax({
                url: '/admin/sys/user/current',
                type: 'GET',
                errNoTip: true,
                success: function (data) {
                    if (!data || !data.data) {
                        console.error('获取用户信息失败:', data);
                        return;
                    }
                    var user = data.data;
                    $('#js-id').val(user.id);
                    $('#js-name').val(user.name);
                    $('#js-username').val(user.username);
                    $('#js-dept-id').val(user.deptId);
                    $('#js-email').val(user.email);
                    $('#js-mobile').val(user.mobile);
                    $('#js-tel').val(user.tel);
                    $('#js-birthday').val(user.birthday);
                    $('#js-pic-id').val(user.picId);

                    if (user.picId) {
                        $('#js-upload-preview').attr('src', '/admin/sys/user/avatar/' + user.picId);
                    }

                    if (user.sex) {
                        $('input[name="sex"][value="' + user.sex + '"]').prop('checked', true);
                    } else {
                        $('input[name="sex"][value="1"]').prop('checked', true);
                    }
                    form.render();
                }
            });

            form.on('submit(js-submit-filter)', function (data) {
                spUtil.ajax({
                    url: '/admin/sys/user/update-profile',
                    type: 'POST',
                    data: data.field,
                    success: function (result) {
                        layer.alert('修改成功！', {
                            icon: 1
                        }, function (alertIndex) {
                            layer.close(alertIndex);
                            parent.layer.close(parent.layer.getFrameIndex(window.name));
                        });
                    }
                });
                return false;
            });
        });
    </script>
</body>

</html>
